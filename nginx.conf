# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name quins.dev api.quins.dev;
    return 301 https://$host$request_uri;
}

# quins.dev (Next.js web app)
server {
    listen 443 ssl http2;
    server_name quins.dev;

    ssl_certificate /etc/letsencrypt/live/quins.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quins.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://localhost:3000;   # Next.js dev server on port 3000
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# api.quins.dev (Express API)
server {
    listen 443 ssl http2;
    server_name api.quins.dev;

    ssl_certificate /etc/letsencrypt/live/api.quins.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.quins.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://localhost:4000;   # Express API on port 4000
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
